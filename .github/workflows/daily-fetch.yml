name: Fetch diari de licitacions

on:
  schedule:
    # Cada dia a les 06:00 UTC (07:00 h peninsular, 08:00 h estiu)
    - cron: '0 6 * * *'

  # Permet executar manualment des de GitHub UI
  workflow_dispatch:
    inputs:
      fuente:
        description: 'Fuente a fetchear (all, place, ted, pscp_cat)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run (no guarda nada)'
        type: boolean
        required: false
        default: false

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: PLACE (Hacienda - Espanya)
  # ─────────────────────────────────────────────────────────────────
  fetch-place:
    name: Fetch PLACE (Hacienda)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.fuente == 'all' || github.event.inputs.fuente == 'place' || github.event_name == 'schedule' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Fetch PLACE
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node fetch-place.js --dry-run
          else
            node fetch-place.js
          fi

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-place-log-${{ github.run_id }}
          path: scripts/fetch.log

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: TED (Comisió Europea)
  # ─────────────────────────────────────────────────────────────────
  fetch-ted:
    name: Fetch TED (EU)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.fuente == 'all' || github.event.inputs.fuente == 'ted' || github.event_name == 'schedule' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Fetch TED
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node fetch-ted.js --dry-run
          else
            node fetch-ted.js --country=ES
          fi

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: PSCP Catalunya
  # ─────────────────────────────────────────────────────────────────
  fetch-pscp-cat:
    name: Fetch PSCP Catalunya
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.fuente == 'all' || github.event.inputs.fuente == 'pscp_cat' || github.event_name == 'schedule' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Fetch PSCP Catalunya
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node fetch-pscp-cat.js --dry-run
          else
            node fetch-pscp-cat.js
          fi

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Notificació final + alertes email
  # Es fa quan tots els fetchers han acabat
  # ─────────────────────────────────────────────────────────────────
  send-alerts:
    name: Enviar alertes email
    runs-on: ubuntu-latest
    needs: [fetch-place, fetch-ted, fetch-pscp-cat]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry_run != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Processar i enviar alertes
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: node send-alerts.js

  # ─────────────────────────────────────────────────────────────────
  # JOB 5: Resum del fetch (sempre s'executa)
  # ─────────────────────────────────────────────────────────────────
  summary:
    name: Resum del fetch diari
    runs-on: ubuntu-latest
    needs: [fetch-place, fetch-ted, fetch-pscp-cat]
    if: always()

    steps:
      - name: Generar resum
        run: |
          echo "## Resum fetch diari $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Font | Estat |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| PLACE (Hacienda) | ${{ needs.fetch-place.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TED (UE) | ${{ needs.fetch-ted.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PSCP Catalunya | ${{ needs.fetch-pscp-cat.result }} |" >> $GITHUB_STEP_SUMMARY
